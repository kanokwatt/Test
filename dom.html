<html>
    <head>
    </head>
    <body>
        <p id="name1">World</p>
        <p id="name2"></p>
        <p id="name3"></p>

        <script>
            var myObject = document.getElementById('name1');
            document.getElementById('name2').innerHTML = 'Hi ' + myObject.innerHTML;

            var myObject1 = document.getElementsByTagName('p');
            document.getElementById('name2').innerHTML = 'Hello ' + myObject1[0].innerHTML;
            document.getElementById('name3').innerHTML = 'Yo ' + myObject1[1].innerHTML;
        </script>
    </body>
</html>
